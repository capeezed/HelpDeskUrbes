<div class="container d-flex justify-content-center min-vh-100 py-5">
  <div class="card p-4 shadow-lg" style="max-width: 500px; width: 100%;">
    <div class="card-body">
      <div class="text-center mb-4">
        
        <img src="assets/logo-urbes.png" alt="Logo URBES" class="img-fluid mb-3" style="max-height: 80px;">
        <h2 class="card-title text-center text-green-primary">Criar Conta</h2>
        <p class="card-subtitle text-muted">Preencha seus dados</p>
      </div>
      
      <form (ngSubmit)="handleCadastro()">
        
        <div class="mb-3">
          <label for="nome" class="form-label">Nome Completo:</label>
          <input id="nome" type="text" class="form-control" [(ngModel)]="nomeCompleto" name="nome" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="setor" class="form-label">Setor:</label>
            
            <select id="setor" 
                    class="form-select" 
                    name="setor"
                    [(ngModel)]="setorSelecionadoId"
                    (change)="onSetorChange()">
              
              <option [ngValue]="null" disabled>
                {{ isLoadingDados ? 'Carregando...' : 'Selecione um setor' }}
              </option>
              <option *ngFor="let setor of listaDeSetores" [ngValue]="setor.id">
                {{ setor.nome }}
              </option>
            </select>
          </div>
          
          <div class="col-md-6 mb-3">
            <label for="cargo" class="form-label">Cargo:</label>
            
            <select id="cargo" 
                    class="form-select" 
                    name="cargo"
                    [(ngModel)]="cargoSelecionadoId"
                    [disabled]="!setorSelecionadoId">
                    
              <option [ngValue]="null" disabled>
                {{ !setorSelecionadoId ? 'Escolha um setor primeiro' : 'Selecione um cargo' }}
              </option>
              <option *ngFor="let cargo of listaDeCargosFiltrada" [ngValue]="cargo.id">
                {{ cargo.nome }}
              </option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha:</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" required>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar Senha:</label>
          <input id="confirmPassword" type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Criar Conta</button>

        <p *ngIf="mensagemErro" class="alert alert-danger text-center">
          {{ mensagemErro }}
        </p>
        <p *ngIf="mensagemSucesso" class="alert alert-success text-center">
          {{ mensagemSucesso }}
        </p>

      </form>

      <div class="text-center mt-3">
        <p class="mb-0">
          Já tem uma conta? <a routerLink="/login" class="text-green-primary">Faça o login</a>
        </p>
      </div>
    </div>
  </div>
</div>
