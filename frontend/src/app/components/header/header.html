<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: var(--green-primary);">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" routerLink="/dashboard">
      <img src="assets/logo-urbes.png" alt="Logo URBES" style="height: 30px; margin-right: 10px;">
      <span class="text-white fw-bold">SUPORTE TI</span>
    </a>

    <ul class="navbar-nav me-auto">

      <!-- Funcionário -->
      <li *ngIf="!authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          Meus Chamados
          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0" class="badge bg-danger ms-1">{{ n }}</span>
        </a>
      </li>

      <li *ngIf="!authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/novo-chamado" routerLinkActive="active">Abrir Chamado</a>
      </li>

      <!-- Técnico -->
      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/fila" routerLinkActive="active">
          Fila de Chamados
          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0" class="badge bg-danger ms-1">{{ n }}</span>
        </a>
      </li>

      <!-- Técnico – Estoque -->
      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/estoque" routerLinkActive="active">
          Estoque
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/usuarios" routerLinkActive="active">
          Controle de Usuários
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/admin-avisos" routerLinkActive="active">
          Avisos
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/dash" routerLinkActive="active">
          Relatórios
        </a>
      </li>

    </ul>

    <div class="d-flex align-items-center">

      <!-- 🔔 Ícone notificações -->
      <div class="dropdown me-3" ngbDropdown>

        <button class="btn btn-outline-light position-relative" ngbDropdownToggle>
          <i class="bi bi-bell fs-5"></i>

          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0"
                class="badge bg-danger notification-badge">
            {{ n }}
          </span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end notif-menu" ngbDropdownMenu>

          <li class="dropdown-header fw-bold">Notificações</li>
          <hr>

          <ng-container *ngIf="(notify.notificacoes$ | async) as lista; else semNotificacoes">

            <li *ngFor="let n of lista" 
                class="dropdown-item notif-item d-flex justify-content-between align-items-center"
                [class.unread]="!n.lida"
                (click)="abrirLink(n)">

              <span>{{ n.texto }}</span>
              <small class="text-muted">{{ n.criado_em | date:'dd/MM/yyyy HH:mm' }}</small>
            </li>

            <li class="text-center mt-2">
              <button class="btn btn-sm btn-link text-danger" (click)="notify.limparTodas()">
                Limpar todas
              </button>
            </li>

          </ng-container>

          <ng-template #semNotificacoes>
            <li class="dropdown-item text-muted text-center">Nenhuma notificação</li>
          </ng-template>

        </ul>
      </div>

      <!-- Usuário logado + logout -->
      <ng-container *ngIf="authService.user$ | async as user">
        <span class="navbar-text text-white me-3">{{ user.nome_completo }}</span>
        <button (click)="logout()" class="btn btn-outline-light btn-sm">Sair</button>
      </ng-container>

    </div>

  </div>
</nav>
