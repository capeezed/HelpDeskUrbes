<nav class="helpdesk-navbar">
  <div class="helpdesk-navbar-inner">
    <a class="brand-lockup" routerLink="/dashboard" aria-label="Ir para o dashboard">
      <span class="brand-logo">
        <img src="assets/logo-urbes.png" alt="Logo URBES">
      </span>
      <span>
        <span class="brand-title">SUPORTE TI</span>
        <span class="brand-subtitle">HelpDesk URBES</span>
      </span>
    </a>

    <ul class="nav-links">
      <li *ngIf="!authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <i class="bi bi-inboxes"></i>
          <span>Meus Chamados</span>
          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0" class="badge bg-danger">{{ n }}</span>
        </a>
      </li>

      <li *ngIf="!authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/novo-chamado" routerLinkActive="active">
          <i class="bi bi-plus-circle"></i>
          <span>Abrir Chamado</span>
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/fila" routerLinkActive="active">
          <i class="bi bi-list-check"></i>
          <span>Fila</span>
          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0" class="badge bg-danger">{{ n }}</span>
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/estoque" routerLinkActive="active">
          <i class="bi bi-box-seam"></i>
          <span>Estoque</span>
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/usuarios" routerLinkActive="active">
          <i class="bi bi-people"></i>
          <span>Usuários</span>
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/admin-avisos" routerLinkActive="active">
          <i class="bi bi-megaphone"></i>
          <span>Avisos</span>
        </a>
      </li>

      <li *ngIf="authService.ehTecnico" class="nav-item">
        <a class="nav-link" routerLink="/admin/dash" routerLinkActive="active">
          <i class="bi bi-bar-chart"></i>
          <span>Relatórios</span>
        </a>
      </li>
    </ul>

    <div class="navbar-tools">
      <div class="dropdown" ngbDropdown>
        <button class="icon-button position-relative" ngbDropdownToggle aria-label="Abrir notificações">
          <i class="bi bi-bell"></i>
          <span *ngIf="(notify.totalNaoLidas$ | async) as n" [hidden]="n === 0"
                class="badge bg-danger notification-badge">
            {{ n }}
          </span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end notif-menu" ngbDropdownMenu>
          <li class="dropdown-header">Notificações</li>

          <ng-container *ngIf="(notify.notificacoes$ | async) as lista; else semNotificacoes">
            <li *ngFor="let n of lista"
                class="dropdown-item notif-item"
                [class.unread]="!n.lida"
                (click)="abrirLink(n)">
              <span>{{ n.texto }}</span>
              <small>{{ n.criado_em | date:'dd/MM/yyyy HH:mm' }}</small>
            </li>

            <li class="px-3 py-2">
              <button class="btn btn-sm btn-outline-danger w-100" (click)="notify.limparTodas()">
                Limpar todas
              </button>
            </li>
          </ng-container>

          <ng-template #semNotificacoes>
            <li class="dropdown-item text-muted text-center">Nenhuma notificação</li>
          </ng-template>
        </ul>
      </div>

      <ng-container *ngIf="authService.user$ | async as user">
        <span class="user-chip" title="{{ user.nome_completo }}">
          <i class="bi bi-person-circle"></i>
          <span>{{ user.nome_completo }}</span>
        </span>
        <button (click)="logout()" class="logout-button">
          <i class="bi bi-box-arrow-right"></i>
          <span>Sair</span>
        </button>
      </ng-container>
    </div>
  </div>
</nav>
