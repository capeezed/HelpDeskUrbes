<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="text-green-primary">Meus Chamados</h1>
      
      <button class="btn btn-primary" routerLink="/novo-chamado">
        Abrir Novo Chamado
      </button>
    </div>
  
    <div *ngIf="chamados$ | async as chamados; else loading">
      
      <div *ngIf="chamados.length === 0" class="alert alert-info">
        Você ainda não abriu nenhum chamado. Clique em "Abrir Novo Chamado" para começar.
      </div>
  
      <ul class="list-group shadow-sm">
       <li *ngFor="let chamado of chamados" class="list-group-item d-flex justify-content-between align-items-center">
  <div>
    <h5 class="mb-1">{{ chamado.titulo }}</h5>
    <small class="text-muted">Prioridade: {{ chamado.prioridade | titlecase }}</small>
  </div>

  <div class="d-flex align-items-center gap-2">

    <span class="badge rounded-pill fs-6" [ngClass]="getStatusClass(chamado.status)">
      {{ chamado.status | titlecase }}
    </span>

    <!-- ✅ Botão para abrir detalhes -->
    <a [routerLink]="['/meus-chamados/detalhe', chamado.id]" 
       class="btn btn-outline-primary btn-sm">
      Ver detalhes
    </a>

  </div>
</li>
      </ul>
    </div>
  
    <ng-template #loading>
      <div class="text-center mt-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Carregando...</span>
        </div>
        <p>Buscando seus chamados...</p>
      </div>
    </ng-template>
  </div>
