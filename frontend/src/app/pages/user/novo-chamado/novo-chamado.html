<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          
          <h2 class="text-green-primary mb-4">Abrir Novo Chamado</h2>

          <form (ngSubmit)="handleNovoChamado()">
            
            <!-- NOVO: Seleção de Tipo -->
            <div class="mb-4">
              <label class="form-label fw-bold">Tipo de Chamado *</label>
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="form-check p-3 border rounded" 
                       [ngClass]="{'border-danger border-2': tipoSelecionado === 'incidente'}">
                    <input 
                      class="form-check-input" 
                      type="radio" 
                      name="tipo" 
                      id="tipoIncidente" 
                      value="incidente"
                      [(ngModel)]="tipoSelecionado"
                      (change)="onTipoChange()">
                    <label class="form-check-label w-100" for="tipoIncidente">
                      <strong class="text-danger">Incidente</strong>
                      <small class="d-block text-muted">Problemas, falhas ou indisponibilidade</small>
                    </label>
                  </div>
                </div>
                
                <div class="col-md-6">
                  <div class="form-check p-3 border rounded"
                       [ngClass]="{'border-primary border-2': tipoSelecionado === 'solicitacao'}">
                    <input 
                      class="form-check-input" 
                      type="radio" 
                      name="tipo" 
                      id="tipoSolicitacao" 
                      value="solicitacao"
                      [(ngModel)]="tipoSelecionado"
                      (change)="onTipoChange()">
                    <label class="form-check-label w-100" for="tipoSolicitacao">
                      <strong class="text-primary">Solicitação</strong>
                      <small class="d-block text-muted">Pedido de serviços ou melhorias</small>
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- NOVO: Dropdown de Categoria Dinâmica -->
            <div class="mb-3">
              <label for="categoria" class="form-label">
                Categoria *
                <small class="text-muted">
                  ({{ tipoSelecionado === 'incidente' ? 'Incidente' : 'Solicitação' }})
                </small>
              </label>
              <select 
                class="form-select" 
                id="categoria" 
                name="categoria"
                [(ngModel)]="categoriaSelecionada" 
                required>
                <option value="">Selecione uma categoria...</option>
                <option *ngFor="let cat of categorias" [value]="cat">
                  {{ cat }}
                </option>
              </select>
            </div>

            <!-- Título -->
            <div class="mb-3">
              <label for="titulo" class="form-label">Título *</label>
              <input 
                type="text" 
                class="form-control" 
                id="titulo" 
                name="titulo"
                placeholder="Ex: Monitor não liga, Impressora travada"
                [(ngModel)]="titulo" 
                required>
            </div>

            <!-- Descrição -->
            <div class="mb-3">
              <label for="descricao" class="form-label">Descrição do Problema *</label>
              <textarea 
                class="form-control" 
                id="descricao" 
                name="descricao" 
                rows="5"
                placeholder="Descreva em detalhes. O que aconteceu? Qual mensagem de erro? Número do patrimônio?"
                [(ngModel)]="descricao" 
                required></textarea>
            </div>

            <!-- Anexo -->
            <div class="mb-3">
              <label for="anexo" class="form-label">
                Anexar Imagens (Opcional)
                <small class="text-muted">- AtÃ© 5 imagens para dar mais contexto</small>
              </label>
              <input 
                type="file" 
                class="form-control" 
                id="anexo"
                accept="image/*"
                multiple
                (change)="onFileSelected($event)">
              <div
                class="paste-zone mt-3"
                tabindex="0"
                (paste)="onPasteAreaPaste($event)">
                <strong>Cole uma imagem aqui</strong>
                <span class="d-block text-muted">
                  Use Ctrl+V depois de copiar um print ou imagem para o clipboard.
                </span>
              </div>
              <div class="anexos-grid mt-3" *ngIf="previewAnexos.length">
                <div class="anexo-preview" *ngFor="let preview of previewAnexos; let i = index">
                  <div class="anexo-preview-label d-flex justify-content-between align-items-center gap-2">
                    <span>
                      {{ preview.nome }}
                      <small class="d-block text-muted" *ngIf="preview.origem === 'clipboard'">Colado do clipboard</small>
                    </span>
                    <button
                      type="button"
                      class="btn btn-outline-secondary btn-sm"
                      (click)="removerAnexo(i)">
                      Remover
                    </button>
                  </div>
                  <img [src]="preview.url" alt="Preview do anexo" class="img-fluid rounded shadow-sm">
                </div>
              </div>
            </div>

            <!-- Mensagens -->
            <p *ngIf="mensagemErro" class="alert alert-danger text-center">
              {{ mensagemErro }}
            </p>
            <p *ngIf="mensagemSucesso" class="alert alert-success text-center">
              {{ mensagemSucesso }}
            </p>

            <!-- Botão de Submit -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
              <button type="submit" class="btn btn-primary btn-lg px-5" [disabled]="isLoading">
                <span *ngIf="!isLoading">Abrir Chamado</span>
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                  Salvando...
                </span>
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
