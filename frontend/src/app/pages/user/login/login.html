<div class="container-fluid min-vh-100 d-flex align-items-center">
  <div class="row w-100 justify-content-center">

    <!-- COLUNA DO LOGIN -->
    <div class="col-md-4">
      <div class="card p-4 shadow-lg">
        <div class="card-body">

          <div class="text-center mb-4">
            <img src="assets/logo-urbes.png" class="img-fluid mb-3" style="max-height: 80px;">
            <h2 class="text-green-primary">TI DESK</h2>
            <p class="text-muted">Acesse sua conta</p>
          </div>

          <form (ngSubmit)="handleLogin()">
            <div class="mb-3">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required>
            </div>

            <div class="mb-3">
              <label>Senha</label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                required>
            </div>

            <button type="submit" class="btn btn-success w-100" [disabled]="isLoading">
              <span *ngIf="!isLoading">Entrar</span>
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
            </button>

            <div *ngIf="mensagemErro" class="alert alert-danger mt-3">
              {{ mensagemErro }}
            </div>
          </form>

          <!-- LINK DE CADASTRO (voltou 😎) -->
          <div class="text-center mt-3">
            <p class="mb-0">
              Não tem uma conta?
              <a routerLink="/cadastro" class="text-green-primary fw-semibold">
                Cadastre-se aqui
              </a>
            </p>
          </div>

        </div>
      </div>
    </div>

    <!-- COLUNA DO MURAL -->
    <div class="col-md-6 ms-md-4 mural-container">
      <div class="card mural-card p-3 shadow-sm">
        <h4 class="mb-3">📢 Avisos Gerais</h4>

        <div *ngIf="avisos.length === 0" class="text-muted">
          Nenhum aviso no momento.
        </div>

        <div *ngFor="let aviso of avisos"
             class="mural-aviso"
             [ngClass]="{
               'mural-info': aviso.tipo === 'info',
               'mural-alerta': aviso.tipo === 'alerta',
               'mural-critico': aviso.tipo === 'critico'
             }">
          <strong>{{ aviso.titulo }}</strong><br>
          {{ aviso.mensagem }}
        </div>
      </div>
    </div>

  </div>
</div>
