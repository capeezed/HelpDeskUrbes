<app-header></app-header>

<div class="helpdesk-page">
<div class="container">
  <div class="page-header">
    <div>
      <p class="page-kicker">Comunicação interna</p>
      <h1 class="page-title">Mural de Avisos</h1>
      <p class="page-subtitle">Publique, edite e remova avisos para os usuários do HelpDesk.</p>
    </div>
  </div>

  <h1 class="text-green-primary mb-4">Mural de Avisos</h1>

  <!-- CRIAR AVISO -->

  <div class="card p-3 mb-4">

    <input
      class="form-control mb-2"
      [(ngModel)]="titulo"
      placeholder="Título do aviso">

    <textarea
      class="form-control mb-2"
      [(ngModel)]="mensagem"
      placeholder="Mensagem do aviso"></textarea>

    <select
      class="form-select mb-3"
      [(ngModel)]="tipo">

      <option value="info">Informativo</option>
      <option value="alerta">Alerta</option>
      <option value="critico">Crítico</option>

    </select>

    <button
      type="button"
      class="btn btn-success w-100"
      (click)="criar()">

      Publicar aviso

    </button>

  </div>

  <!-- LISTA -->

  <div
    *ngFor="let aviso of avisos"
    class="alert shadow-sm"
    [ngClass]="{
      'alert-info': aviso.tipo === 'info',
      'alert-warning': aviso.tipo === 'alerta',
      'alert-danger': aviso.tipo === 'critico'
    }">

    <!-- VISUALIZAÇÃO -->

    <div *ngIf="editandoId !== aviso.id">

      <strong>{{ aviso.titulo }}</strong><br>
      {{ aviso.mensagem }}

      <div class="float-end">

        <button
          type="button"
          class="btn btn-sm btn-primary me-2"
          (click)="editar(aviso)">

          Editar

        </button>

        <button
          type="button"
          class="btn btn-sm btn-danger"
          (click)="remover(aviso.id)">

          X

        </button>

      </div>

    </div>

    <!-- EDIÇÃO -->

    <div *ngIf="editandoId === aviso.id">

      <input
        class="form-control mb-2"
        [(ngModel)]="aviso.titulo">

      <textarea
        class="form-control mb-2"
        [(ngModel)]="aviso.mensagem"></textarea>

      <select
        class="form-select mb-2"
        [(ngModel)]="aviso.tipo">

        <option value="info">Informativo</option>
        <option value="alerta">Alerta</option>
        <option value="critico">Crítico</option>

      </select>

      <button
        class="btn btn-success btn-sm me-2"
        (click)="salvar(aviso)">

        Salvar

      </button>

      <button
        class="btn btn-secondary btn-sm"
        (click)="cancelar()">

        Cancelar

      </button>

    </div>

  </div>

</div>
</div>
