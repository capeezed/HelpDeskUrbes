<app-header></app-header>

<!-- Dropdown -->
<ul class="dropdown-menu dropdown-menu-end notif-menu">
  <li class="dropdown-header fw-bold">Notificações</li>

  <!-- Listagem -->
  <li *ngFor="let n of (notify.notificacoes$ | async)"
      class="dropdown-item d-flex justify-content-between align-items-center"
      [class.unread]="!n.lida">
      <span>{{ n.texto }}</span>
      <small class="text-muted">{{ n.tempo }}</small>
  </li>

  <!-- Divisor -->
  <li><hr class="dropdown-divider"></li>

  <!-- Botão limpar -->
  <li class="text-center">
    <button class="btn btn-sm btn-outline-secondary" (click)="notify.limparTodas()">
      Limpar tudo
    </button>
  </li>
</ul>
<router-outlet></router-outlet>
